<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ツムツム コイン補正総合ポータル</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #f1f3f5;
            --card-bg: #ffffff;
            --text-color: #343a40;
            --border-color: #ced4da;
            --accent-color: #e63946;
            --focus-color: #4a90e2;
            --admin-color: #27ae60;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* ヘッダー・最上部バー */
        .top-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .site-logo {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-color);
            cursor: pointer;
            text-decoration: none;
        }

        /* Windowsのアカウント風丸型ボタン */
        .account-btn {
            background-color: #e0e0e0;
            border: 2px solid transparent;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            padding: 0;
        }

        .account-btn:hover {
            background-color: #d0d0d0;
            border-color: var(--primary-color);
        }

        .account-btn::before {
            content: "";
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #666;
            border-radius: 50%;
            top: 6px;
        }

        .account-btn::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 10px;
            background-color: #666;
            border-radius: 10px 10px 0 0;
            bottom: 4px;
        }

        /* メインコンテナ */
        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 各種カードの基本形 */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            padding: 25px;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        /* ホーム画面用の幅広カード */
        .home-card {
            max-width: 800px;
            text-align: center;
        }

        h1, h2 {
            font-size: 1.4rem;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 10px;
        }

        /* 📢 お知らせボード */
        .notice-board {
            background: #fff;
            border-left: 5px solid var(--focus-color);
            padding: 15px 20px;
            border-radius: 6px;
            margin-bottom: 25px;
            text-align: left;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .notice-title {
            font-weight: bold;
            color: var(--focus-color);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .notice-item {
            font-size: 0.95rem;
            border-bottom: 1px dashed #eee;
            padding: 8px 0;
        }
        .notice-item:last-child {
            border-bottom: none;
        }
        .notice-date {
            font-size: 0.75rem;
            color: #868e96;
            margin-left: 10px;
        }

        /* メニューボタンの横並びレイアウト */
        .menu-grid {
            display: flex;
            gap: 15px;
            justify-content: center;
            width: 100%;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .menu-btn {
            flex: 1;
            min-width: 180px;
            max-width: 240px;
            padding: 25px 15px;
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: bold;
            color: var(--primary-color);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .menu-btn:hover {
            border-color: var(--primary-color);
            background-color: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }

        .menu-btn.admin-only-btn {
            border-color: var(--admin-color);
            color: var(--admin-color);
        }
        .menu-btn.admin-only-btn:hover {
            background-color: #eef9f2;
            border-color: var(--admin-color);
        }

        .menu-btn-desc {
            font-size: 0.8rem;
            color: #6c757d;
            font-weight: normal;
        }

        /* 戻るボタン */
        .back-btn {
            background: none;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
            align-self: flex-start;
        }

        .back-btn:hover {
            background-color: var(--primary-color);
            color: white;
        }

        /* 入力フォーム類 */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="number"], input[type="text"], input[type="email"], input[type="password"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1.1rem;
            box-sizing: border-box;
            background-color: #f8f9fa;
            transition: all 0.2s;
            font-family: inherit;
        }

        textarea {
            font-size: 1rem;
            resize: vertical;
            min-height: 100px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--focus-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
        }

        .result-container {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background-color: #f8f9fa;
            border: 1px dashed var(--border-color);
            text-align: center;
        }

        .result-label {
            font-size: 0.85rem;
            color: #6c757d;
            font-weight: bold;
        }

        .result-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent-color);
            display: block;
            margin-top: 5px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* 画面最前面ポップアップ（モーダル） */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
            animation: fadeIn 0.2s ease;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #aaa;
        }

        .modal-close:hover {
            color: #333;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 管理者用セクション */
        .admin-section {
            border: 2px solid var(--admin-color);
            max-width: 700px;
        }
        
        .admin-title {
            color: var(--admin-color);
            border-bottom-color: #e2f4e9;
        }

        .msg-item {
            background: #fdfdfd;
            border: 1px solid #e9ecef;
            border-left: 4px solid var(--admin-color);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 12px;
            font-size: 0.9rem;
            text-align: left;
        }

        .msg-meta {
            font-size: 0.75rem;
            color: #868e96;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        /* ページの表示切り替え用 */
        .page {
            display: none;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page.active {
            display: flex;
        }
    </style>

<body>

<div class="top-bar">
    <div class="site-logo" onclick="showPage('homePage')">🏠 ツムツム補正ツール</div>
    <button id="loginNavBtn" class="account-btn" onclick="openLoginModal()" title="管理者ログイン"></button>
</div>

<div class="container">

    <div id="homePage" class="page active">
        <div class="card home-card">
            <h1>ツムツム コイン補正判定システム</h1>
            
            <div class="notice-board" id="userNoticeBoard" style="display: none;">
                <div class="notice-title">📢 お知らせ</div>
                <div id="userNoticeList">お知らせを読み込み中...</div>
            </div>

            <p style="color: #6c757d; font-size: 0.95rem;">メニューを選んで選択してください。</p>
            
            <div class="menu-grid">
                <button class="menu-btn" onclick="showPage('toolPage')">
                    <span>📊 逆算ツール</span>
                    <span class="menu-btn-desc">消去数から補正値を自動判定</span>
                </button>
                <button class="menu-btn" onclick="showPage('contactPage')">
                    <span>📩 ご意見ボックス</span>
                    <span class="menu-btn-desc">不具合報告や感想の送信</span>
                </button>
                <button class="menu-btn admin-only-btn" id="homeAdminBtn" onclick="showPage('adminPage')" style="display: none;">
                    <span>🛠️ 管理ツール</span>
                    <span class="menu-btn-desc">お知らせ投稿・お問合せ確認</span>
                </button>
            </div>
        </div>
    </div>

    <div id="toolPage" class="page" style="display: none;">
        <button class="back-btn" onclick="showPage('homePage')">← ホームへ戻る</button>
        <div class="card">
            <h1>コイン補正 判定ツール</h1>
            <div class="form-group"><label>消去数 (1〜45):</label><input type="number" id="inputX" min="1" max="45" value="20"></div>
            <div class="form-group"><label>消去前のコイン数:</label><input type="number" id="coinBefore" min="0" value="0"></div>
            <div class="form-group"><label>消去後のコイン数:</label><input type="number" id="coinAfter" min="0" value="80"></div>
            <div class="result-container"><div class="result-label">判定された補正値</div><span id="resultValue" class="result-value">-</span></div>
        </div>
    </div>

    <div id="contactPage" class="page" style="display: none;">
        <button class="back-btn" onclick="showPage('homePage')">← ホームへ戻る</button>
        <div class="card">
            <h2>制作者へのメッセージ</h2>
            <form id="contactForm" onsubmit="submitMessage(event)">
                <div class="form-group"><label>お名前（ニックネーム可）:</label><input type="text" id="msgName" required placeholder="たなか"></div>
                <div class="form-group"><label>返信用メールアドレス（任意）:</label><input type="email" id="msgEmail" placeholder="example@email.com"></div>
                <div class="form-group"><label>メッセージ内容:</label><textarea id="msgBody" required placeholder="バグ報告、感想など"></textarea></div>
                <button type="submit" class="submit-btn">メッセージを送信する</button>
            </form>
        </div>
    </div>

    <div id="adminPage" class="page" style="display: none;">
        <button class="back-btn" onclick="showPage('homePage')">← ホームへ戻る</button>
        
        <div class="card admin-section" style="margin-bottom: 20px;">
            <h2 class="admin-title">📝 新しいお知らせを投稿</h2>
            <form id="noticeForm" onsubmit="submitNotice(event)">
                <div class="form-group">
                    <label>お知らせ内容:</label>
                    <textarea id="noticeBody" required placeholder="例：新ツムのデータを反映しました！"></textarea>
                </div>
                <button type="submit" class="submit-btn" style="background-color: var(--admin-color);">お知らせを公開する</button>
            </form>
        </div>

        <div class="card admin-section">
            <h2 class="admin-title">📥 受信メッセージ一覧</h2>
            <div id="messageList">メッセージを読み込み中...</div>
        </div>
    </div>

</div>

<div class="modal-overlay" id="loginModal" onclick="closeLoginModalOutside(event)">
    <div class="modal-card">
        <button class="modal-close" onclick="closeLoginModal()">×</button>
        <h2>管理者ログイン</h2>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group"><label>管理者メールアドレス:</label><input type="email" id="loginEmail" required></div>
            <div class="form-group"><label>パスワード:</label><input type="password" id="loginPassword" required></div>
            <button type="submit" class="submit-btn" style="background-color: var(--admin-color);">ログイン</button>
        </form>
    </div>
</div>

                    alert('ログアウトしました');
                    showPage('homePage');
                });

        } else {
            document.getElementById('loginModal').style.display = 'flex';
        }

        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('loginForm').reset();

    function lookupCorrection() {
        const x = parseInt(document.getElementById('inputX').value);
        const before = parseInt(document.getElementById('coinBefore').value);
        const after = parseInt(document.getElementById('coinAfter').value);
        const resultSpan = document.getElementById('resultValue');
        if (isNaN(x) || isNaN(before) || isNaN(after)) { resultSpan.innerText = '-'; return; }
        const targetCoins = after - before;
        if (targetCoins < 0) { resultSpan.innerText = '入力エラー'; return; }
        const rowData = rawTableData[x];
        if (!rowData) { resultSpan.innerText = '範囲外'; return; }
        let bestIndex = null, minDiff = Infinity;
        for (let i = 0; i < rowData.length; i++) {
            const diff = Math.abs(rowData[i] - targetCoins);
            if (diff < minDiff) { minDiff = diff; bestIndex = i; }
        }
        if (bestIndex !== null) {
            let matchedHeader = correctionHeaders[bestIndex];
            let displayText = matchedHeader === 'なし' ? '補正 なし' : '補正 ' + matchedHeader;
            if (targetCoins === 0 && rowData[bestIndex] === 0) {
                let matchCount = rowData.filter(v => v === 0).length;
                if (matchCount > 1) displayText = '判定不可 (0枚重複)';
            } else if (minDiff !== 0) { displayText += ' *'; }
            resultSpan.innerText = displayText;
        }
    }

    // --- Firebase 認証・ログイン処理 ---
    window.handleLogin = function(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        window.signInUser(window.fbAuth, email, pass)
            .then(() => {
                closeLoginModal();
                showPage('adminPage');
            })
            .catch(err => {
                alert('ログイン失敗: ' + err.message);
            });
    }

    // 状態のリアルタイム監視
    let unsubMessages = null;
    window.addEventListener('load', () => {
        ['inputX', 'coinBefore', 'coinAfter'].forEach(id => {
            document.getElementById(id).addEventListener('input', lookupCorrection);
        });
        lookupCorrection();

        // 📢 【全ユーザー共通】最新のお知らせを3件取得してホーム画面に表示
        const nq = window.query(window.collection(window.fbDb, "notices"), window.orderBy("timestamp", "desc"), window.limit(3));
        window.onSnapshot(nq, (snapshot) => {
            const board = document.getElementById('userNoticeBoard');
            const listDiv = document.getElementById('userNoticeList');
            if (snapshot.empty) {
                board.style.display = 'none';
                return;
            }
            board.style.display = 'block';
            let html = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const date = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleDateString() : '';
                html += `
                    <div class="notice-item">
                        <span>${escapeHtml(data.content)}</span><span class="notice-date">${date}</span>
                    </div>
                `;
            });
            listDiv.innerHTML = html;
        });

        // 🔐 管理者ログイン状態の監視（常に監視し続ける）
        window.fbAuth.onAuthStateChanged(user => {
            const loginNavBtn = document.getElementById('loginNavBtn');
            const homeAdminBtn = document.getElementById('homeAdminBtn');
            
            if (user) {
                loginNavBtn.style.borderColor = 'var(--admin-color)';
                loginNavBtn.title = 'ログアウトする';
                
                // 🔐 ログイン中なら、ホーム画面の「管理ツール」ボタンを出現させる
                if(homeAdminBtn) homeAdminBtn.style.display = 'flex';
                
                // メッセージ取得リスナーが未接続なら接続する
                if (!unsubMessages) {
                    const q = window.query(window.collection(window.fbDb, "messages"), window.orderBy("timestamp", "desc"));
                    unsubMessages = window.onSnapshot(q, (snapshot) => {
                        const listDiv = document.getElementById('messageList');
                        if (snapshot.empty) {
                            listDiv.innerText = '届いているメッセージはありません。';
                            return;
                        }
                        let html = '';
                        snapshot.forEach(doc => {
                            const data = doc.data();
                            const date = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString() : '送信中...';
                            html += `
                                <div class="msg-item">
                                    <div class="msg-meta"><span>👤 ${escapeHtml(data.name)} (${escapeHtml(data.email || 'メールなし')})</span><span>⏱ ${date}</span></div>
                                    <div style="white-space:pre-wrap;">${escapeHtml(data.message)}</div>
                                </div>
                            `;
                        });
                        listDiv.innerHTML = html;
                    });
                }
            } else {
                // ログアウト状態
                loginNavBtn.style.borderColor = 'transparent';
                loginNavBtn.title = '管理者ログイン';
                
                // 🔐 ログアウト中なら、ホーム画面の「管理ツール」ボタンを隠す
                if(homeAdminBtn) homeAdminBtn.style.display = 'none';
                
                if (unsubMessages) { unsubMessages(); unsubMessages = null; }
            }
        });
    });

    // 📩 ユーザーからのメッセージ送信処理
    window.submitMessage = function(e) {
        e.preventDefault();
        const name = document.getElementById('msgName').value;
        const email = document.getElementById('msgEmail').value;
        const message = document.getElementById('msgBody').value;

        window.addDoc(window.collection(window.fbDb, "messages"), {
            name: name,
            email: email,
            message: message,
            timestamp: new Date()
        }).then(() => {
            alert('メッセージを送信しました！ありがとうございます。');
            document.getElementById('contactForm').reset();
            showPage('homePage');
        }).catch(err => {
            alert('送信に失敗しました: ' + err.message);
        });
    }

    // 📢 【管理者専用】お知らせの投稿処理
    window.submitNotice = function(e) {
        e.preventDefault();
        const content = document.getElementById('noticeBody').value;

        window.addDoc(window.collection(window.fbDb, "notices"), {
            content: content,
            timestamp: new Date()
        }).then(() => {
            alert('お知らせを公開しました！');
            document.getElementById('noticeForm').reset();
        }).catch(err => {
            alert('お知らせの公開に失敗しました: ' + err.message);
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
