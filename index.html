<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ツムツム コイン補正総合ポータル</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #f1f3f5;
            --card-bg: #ffffff;
            --text-color: #343a40;
            --border-color: #ced4da;
            --accent-color: #e63946;
            --focus-color: #4a90e2;
            --admin-color: #27ae60;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* ヘッダー・最上部バー */
        .top-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .site-logo {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-color);
            cursor: pointer;
            text-decoration: none;
        }

        /* Windowsのアカウント風丸型ボタン */
        .account-btn {
            background-color: #e0e0e0;
            border: 2px solid transparent;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            padding: 0;
        }

        .account-btn:hover {
            background-color: #d0d0d0;
            border-color: var(--primary-color);
        }

        .account-btn::before {
            content: "";
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #666;
            border-radius: 50%;
            top: 6px;
        }

        .account-btn::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 10px;
            background-color: #666;
            border-radius: 10px 10px 0 0;
            bottom: 4px;
        }

        /* メインコンテナ */
        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 各種カードの基本形 */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            padding: 25px;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        /* ホーム画面用の幅広カード */
        .home-card {
            max-width: 800px;
            text-align: center;
        }

        h1, h2 {
            font-size: 1.4rem;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 10px;
        }

        /* 📢 お知らせボード */
        .notice-board {
            background: #fff;
            border-left: 5px solid var(--focus-color);
            padding: 15px 20px;
            border-radius: 6px;
            margin-bottom: 25px;
            text-align: left;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .notice-title {
            font-weight: bold;
            color: var(--focus-color);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .notice-item {
            font-size: 0.95rem;
            border-bottom: 1px dashed #eee;
            padding: 8px 0;
        }
        .notice-item:last-child {
            border-bottom: none;
        }
        .notice-date {
            font-size: 0.75rem;
            color: #868e96;
            margin-left: 10px;
        }

        /* メニューボタンの横並びレイアウト */
        .menu-grid {
            display: flex;
            gap: 15px;
            justify-content: center;
            width: 100%;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .menu-btn {
            flex: 1;
            min-width: 180px;
            max-width: 240px;
            padding: 25px 15px;
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: bold;
            color: var(--primary-color);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

            border-color: var(--primary-color
